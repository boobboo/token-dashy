services:
  backend:
    build: ./backend
    ports:
      - "${TOKEN_DASHY_BACKEND_PORT:-8010}:8000"
    volumes:
      - sqlite_data:/data
    env_file:
      - .env
    environment:
      TOKEN_DASHY_DB_PATH: /data/token_dashy.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${TOKEN_DASHY_FRONTEND_PORT:-3010}:3000"
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8010}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
